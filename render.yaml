services:
  # PostgreSQL Database
  - type: pserv
    name: rise-db
    env: docker
    dockerfilePath: ./Dockerfile.db
    envVars:
      - key: POSTGRES_DB
        value: rise
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        sync: false

  # FastAPI Backend + React Frontend (Combined Service)
  - type: web
    name: rise-api
    runtime: python
    buildCommand: cd frontend && npm install && npm run build && cd .. && mkdir -p backend/static && cp -r frontend/dist/* backend/static/ && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: standard
    envVars:
      - key: DATABASE_URL
        fromService:
          name: rise-db
          type: pserv
          property: connectionString
      - key: DATABASE_URL
        value: postgresql://postgres:${POSTGRES_PASSWORD}@rise-db:5432/rise
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION
        value: 1440
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 8000
      - key: API_RELOAD
        value: "False"
      - key: CORS_ORIGINS
        value: https://yourdomain.com,https://www.yourdomain.com
      - key: ML_MODEL_PATH
        value: ./ml/models/saved/
      - key: LOG_LEVEL
        value: INFO


